<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بنك دم الديرس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0000C; --red-dark: #8B0000; --cream: #FFF8F8; --dark: #1A0A0A;
    --gray: #6B6B6B; --light-gray: #F5F5F5; --border: #E8D5D5; --success: #2D7A3A;
    --shadow: 0 4px 20px rgba(192,0,12,0.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Cairo',sans-serif; background:var(--cream); color:var(--dark); min-height:100vh; padding-bottom: 40px; }
  header { background:var(--red-dark); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 12px rgba(0,0,0,0.3); position:sticky; top:0; z-index:100; }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-drop { font-size:28px; }
  .logo-text h1 { font-size:18px; font-weight:900; color:white; }
  .admin-btn-header { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:white; padding:6px 14px; border-radius:20px; cursor:pointer; }
  .hero { background:linear-gradient(135deg,var(--red-dark),var(--red)); padding:40px 20px 50px; text-align:center; color:white; }
  .stats-bar { background:white; margin:-20px 16px 0; border-radius:16px; padding:16px 20px; display:flex; justify-content:space-around; box-shadow:var(--shadow); }
  .stat-num { font-size:22px; font-weight:900; color:var(--red); display:block; }
  .main-actions { padding:30px 16px 16px; display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .action-card { background:white; border-radius:16px; padding:24px 16px; text-align:center; cursor:pointer; box-shadow:0 2px 12px rgba(0,0,0,.06); }
  .section { padding:8px 16px 20px; }
  .blood-types-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .blood-type-btn { background:white; border:2px solid var(--border); border-radius:12px; padding:12px 4px; cursor:pointer; }
  .blood-type-btn.active { background:var(--red); border-color:var(--red); color:white; }
  .donor-card { background:white; border-radius:16px; padding:16px; margin-bottom:12px; display:flex; align-items:center; gap:10px; border-right:4px solid var(--red); }
  .donor-blood { background:var(--red); color:white; width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; }
  .donor-info { flex:1; }
  .call-btn { background:#007bff; color:white; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; text-decoration:none; font-size:20px; }
  .whatsapp-btn { background:#25D366; color:white; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; text-decoration:none; font-size:20px; }
  .page { display:none; } .page.active { display:block; }
  footer { text-align: center; padding: 30px; font-size: 14px; color: var(--gray); font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-drop">🩸</span>
    <div class="logo-text"><h1>بنك دم الديرس</h1></div>
  </div>
  <button class="admin-btn-header" onclick="openAdminLogin()">⚙️ أدمن</button>
</header>

<div id="page-home" class="page active">
  <div class="hero">
    <h2>❤️ دمك بينقذ حياة</h2>
    <p>سجّل بياناتك وكن جزء من شبكة التبرع بالدم في الديرس</p>
  </div>
  <div class="main-actions">
    <div class="action-card" onclick="showPage('page-register')">📝 سجّل كمتبرع</div>
    <div class="action-card" onclick="showPage('page-search')">🔍 ابحث عن دم</div>
  </div>
</div>

<footer>
  Made by Adel Elbatawy
</footer>

<script>
// دالة renderResults المحدثة التي تحتوي على أزرار الاتصال
function renderResults() {
  const container = document.getElementById('search-results');
  container.innerHTML = allDonors.map(d => `
    <div class="donor-card">
      <div class="donor-blood">${d.blood_type}</div>
      <div class="donor-info">
        <div class="donor-name">${d.name}</div>
        <div class="donor-meta">📞 ${d.phone}</div>
      </div>
      <a href="tel:${d.phone}" class="call-btn">📞</a>
      <a href="https://wa.me/${d.phone.replace(/^0/, '20')}" target="_blank" class="whatsapp-btn">💬</a>
    </div>
  `).join('');
}
// باقي دوال JavaScript الخاصة بك ...
</script>

</body>
</html>
